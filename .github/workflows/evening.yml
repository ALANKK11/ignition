name: evening scan
on:
  schedule:
    - cron: "15 1 * * 2-6"     # 9:15pm ET during daylight time (cron is UTC)
  workflow_dispatch:            # lets you run it manually from the Actions tab
permissions:
  contents: write
concurrency:
  group: ignition
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: grade yesterday · scan tonight · render hub
        env:
          IGNITION_HOME: ${{ github.workspace }}/data
        run: |
          python ignition.py eval || true
          python ignition.py scan
          python ignition.py hub
      - name: publish
        run: |
          git config user.name ignition-bot
          git config user.email ignition@users.noreply.github.com
          git add -A data docs
          git commit -m "evening scan $(date -u +%F)" || exit 0
          git pull --rebase --autostash
          git push
