name: flow snapshot
on:
  schedule:
    - cron: "*/20 11-23 * * 1-5"   # 7:00am–7:59pm ET session coverage (UTC cron)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: ignition
  cancel-in-progress: false
jobs:
  snap:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - id: gate                       # pre-market sweep / open engine / AH sweep
        run: |
          python - <<'PY'
          import datetime, zoneinfo, os
          now = datetime.datetime.now(zoneinfo.ZoneInfo("America/New_York"))
          hm = (now.hour, now.minute)
          mode = "off"
          if now.weekday() < 5:
              if (7, 0) <= hm < (9, 30):
                  mode = "pre"
              elif (9, 32) <= hm and now.hour < 16:
                  mode = "open"
              elif (16, 10) <= hm and now.hour < 20:
                  mode = "post"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"mode={mode}\n")
          PY
      - if: steps.gate.outputs.mode != 'off'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - if: steps.gate.outputs.mode != 'off'
        run: pip install -r requirements.txt
      - if: steps.gate.outputs.mode == 'open'
        name: flow reading · render hub
        env:
          IGNITION_HOME: ${{ github.workspace }}/data
          ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: |
          python ignition.py flow --ticks 1 --interval 0
          python ignition.py hub
      - if: steps.gate.outputs.mode == 'pre' || steps.gate.outputs.mode == 'post'
        name: extended-hours ignition sweep · render hub
        env:
          IGNITION_HOME: ${{ github.workspace }}/data
          ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python ignition.py ext --session ${{ steps.gate.outputs.mode }}
          python ignition.py hub
      - if: steps.gate.outputs.mode != 'off'
        name: publish
        run: |
          git config user.name ignition-bot
          git config user.email ignition@users.noreply.github.com
          git add -A data docs
          git commit -m "flow $(date -u +%FT%H:%M)" || exit 0
          git pull --rebase --autostash
          git push
